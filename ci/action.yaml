name: Deploy to Kiwi 🚀
description: Deploy a new version of a service hosted on a Kiwi instance.

inputs:
  kiwi-domain:
    description: the domain used to access the Kiwi instance, e.g. "kiwi-application.com"
    type: string
    required: true
  service-name:
    description: the name of the service to deploy
    type: string
    required: true
  image-sha:
    description: the SHA256 sum of your Docker image
    type: string
    required: true
  tarball:
    description: path to a Docker image tarball to load into Kiwi before deploy
    type: string
    required: false

runs:
  using: composite
  steps:
    - name: Ensure cURL is installed
      shell: bash
      run: |
        sudo apt update
        sudo apt install -y curl
    
    - name: Upload tarball
      if: ${{ inputs.tarball != '' }}
      shell: bash
      run: |
        token=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=kiwiDeploy" | jq -r '.value')
        curl -X POST https://ci.${{ inputs.kiwi-domain }}/api/push-tarball \
          -F "oidc_token=$token" \
          -F "tarball=@${{ inputs.tarball }}" \
          --fail-with-body

    - name: Deploy service
      shell: bash
      run: |
        token=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=kiwiDeploy" | jq -r '.value')
        curl -X POST https://ci.${{ inputs.kiwi-domain }}/api/deploy/${{ inputs.service-name }} \
          -H "Content-Type: application/json" \
          -d '{"oidc_token": "'"$token"'", "image_sha": "'"${{ inputs.image-sha }}"'"}' \
          --fail-with-body
